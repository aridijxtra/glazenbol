<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Glazen Bol ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Special+Elite&family=Crimson+Text:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dark: #8a6a1a;
    --deep: #0a0508;
    --text-light: #f5ecd7;
    --text-dim: #a89070;
    --reel-bg: #0d0520;
    --reel-border: #3a1a6a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--deep);
    color: var(--text-light);
    font-family: 'Crimson Text', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(80,20,120,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(40,10,80,0.5) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(20,5,40,0.8) 0%, transparent 80%);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 8%,  rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 72% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 85%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 65% 35%, rgba(201,168,76,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 15% 55%, rgba(201,168,76,0.4) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    padding: 20px 16px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── 1. GLAZEN BOL helemaal bovenaan ── */
  .bol-wrap {
    width: 200px;
    height: 200px;
    margin: 0 auto 14px;
    flex-shrink: 0;
  }
  .bol-wrap svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 28px rgba(140,100,255,0.55)) drop-shadow(0 0 8px rgba(201,168,76,0.3));
    animation: float 5s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-10px); }
  }
  .bol-mist  { animation: mist-drift  8s ease-in-out infinite alternate; transform-origin: center; }
  .bol-mist2 { animation: mist-drift2 11s ease-in-out infinite alternate; transform-origin: center; }
  @keyframes mist-drift  { 0%{opacity:.18;transform:scale(1) rotate(0deg);}    100%{opacity:.32;transform:scale(1.08) rotate(12deg);} }
  @keyframes mist-drift2 { 0%{opacity:.22;transform:scale(1.05) rotate(0deg);} 100%{opacity:.12;transform:scale(.92)  rotate(-15deg);} }
  .bol-glow-ring { animation: ring-pulse 4s ease-in-out infinite; }
  @keyframes ring-pulse { 0%,100%{opacity:.3;} 50%{opacity:.65;} }

  /* ── 2. HEADER: titel + tagline ── */
  .header {
    text-align: center;
    margin-bottom: 16px;
  }
  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(2rem, 7vw, 3rem);
    font-weight: 700;
    color: var(--gold-light);
    text-shadow: 0 0 30px rgba(201,168,76,0.5), 0 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 0.02em;
    line-height: 1.1;
  }
  .tagline {
    font-family: 'Crimson Text', Georgia, serif;
    font-style: italic;
    font-size: 1.05rem;
    color: var(--text-dim);
    margin-top: 8px;
    line-height: 1.4;
    max-width: 340px;
    margin-left: auto;
    margin-right: auto;
  }

  /* ── MACHINE ── */
  .machine {
    width: 100%;
    background: linear-gradient(160deg, #1a0a30 0%, #0d051a 100%);
    border: 2px solid var(--gold-dark);
    border-radius: 20px;
    padding: 18px 14px 22px;
    box-shadow:
      0 0 0 1px rgba(201,168,76,0.1),
      0 0 40px rgba(100,30,180,0.3),
      inset 0 1px 0 rgba(201,168,76,0.15),
      inset 0 -1px 0 rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
  }

  /* Vage bol als achtergrond in de machine */
  .machine-bol-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.13;
  }
  .machine-bol-bg svg { width: 340px; height: 340px; }

  .machine::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
    opacity: 0.4;
    z-index: 1;
  }
  .machine > *:not(.machine-bol-bg) { position: relative; z-index: 2; }

  /* ── 3. Ornament boven: "op de volgende gebieden" ── */
  .ornament {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .ornament-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
  }
  /* bovenste ornament heeft tekst ipv stipjes */
  .ornament-text {
    font-family: 'Special Elite', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.85;
    white-space: nowrap;
  }
  .ornament-diamond { color: var(--gold); font-size: 0.7rem; }

  /* ── REELS ── */
  .reels-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .reel-wrapper {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  /* 4. Reel labels: groter, bold */
  .reel-label {
    font-family: 'Special Elite', monospace;
    font-size: 0.78rem;
    font-weight: bold;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold-light);
    text-align: center;
  }

  .reel {
    background: var(--reel-bg);
    border: 1px solid var(--reel-border);
    border-radius: 10px;
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    box-shadow:
      inset 0 2px 8px rgba(0,0,0,0.6),
      inset 0 0 20px rgba(60,10,100,0.3),
      0 0 8px rgba(80,30,140,0.2);
  }
  .reel::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
    pointer-events: none;
    z-index: 2;
  }
  .reel::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 50px;
    border-top: 1px solid rgba(201,168,76,0.25);
    border-bottom: 1px solid rgba(201,168,76,0.25);
    background: rgba(201,168,76,0.05);
    z-index: 1;
    pointer-events: none;
  }
  .reel-strip {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 0 6px;
  }
  .reel-item {
    height: 110px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    width: 100%;
    padding: 6px;
  }

  /* 7. Icoon groter */
  .reel-item .emoji {
    font-size: 2.2rem;
    line-height: 1;
  }
  .reel-item .label {
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 0.82rem;
    color: var(--text-light);
    text-align: center;
    line-height: 1.25;
    max-width: 130px;
  }

  .reel.spinning .reel-strip { animation: spin-reel 0.09s linear infinite; }
  @keyframes spin-reel {
    0%   { transform: translateY(0); }
    100% { transform: translateY(-110px); }
  }

  /* ── SPIN BUTTON ── */
  .btn-area { display: flex; flex-direction: column; align-items: center; gap: 12px; }

  .spin-btn {
    background: linear-gradient(135deg, #c9a84c 0%, #f0d080 40%, #c9a84c 60%, #8a6a1a 100%);
    color: #0a0508;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    box-shadow: 0 4px 0 #5a3d00, 0 6px 20px rgba(201,168,76,0.3), inset 0 1px 0 rgba(255,255,255,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
    position: relative;
    overflow: hidden;
  }
  .spin-btn::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transform: skewX(-20deg);
    transition: left 0.4s;
  }
  .spin-btn:hover::after { left: 160%; }
  .spin-btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #5a3d00, 0 3px 10px rgba(201,168,76,0.2), inset 0 1px 0 rgba(255,255,255,0.4);
  }
  .spin-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* ── RESULT BOX ── */
  .result-box {
    width: 100%;
    margin-top: 18px;
    background: rgba(20,5,40,0.88);
    border: 1px solid var(--gold-dark);
    border-radius: 14px;
    padding: 20px 18px;
    display: none;
    flex-direction: column;
    animation: fadeInUp 0.4s ease;
  }
  .result-box.visible { display: flex; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* 5. Result header: "de bol heeft gesproken" + "over 20 jaar" prominenter */
  .result-header {
    text-align: center;
    margin-bottom: 16px;
  }
  .result-header .spoken {
    font-family: 'Special Elite', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.85;
    display: block;
  }
  .result-header .over20 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    font-weight: 700;
    font-style: italic;
    color: var(--gold-light);
    text-shadow: 0 0 20px rgba(201,168,76,0.4);
    display: block;
    margin-top: 4px;
    line-height: 1.1;
  }

  /* 6. Resultaat-regels: vraag groter+contrast, antwoord lowercase + iets groter */
  .result-line {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(201,168,76,0.12);
    line-height: 1.4;
    flex-wrap: wrap;
  }
  .result-line:last-of-type { border-bottom: none; }

  .result-line .q {
    font-family: 'Crimson Text', Georgia, serif;
    font-style: italic;
    font-size: 1.02rem;
    color: var(--text-light);
    font-weight: 600;
    min-width: 160px;
    flex-shrink: 0;
  }
  .result-line .a {
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 1.12rem;
    color: var(--gold-light);
    /* antwoord geen hoofdletter – geregeld in JS via .toLowerCase() op eerste letter */
  }

  /* Website-link onderaan result box (zichtbaar op screenshot) */
  .result-url {
    text-align: center;
    margin-top: 14px;
    font-family: 'Special Elite', monospace;
    font-size: 0.68rem;
    color: var(--gold);
    letter-spacing: 0.14em;
    opacity: 0.7;
  }

  /* ── SHARE ── */
  .share-area {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .share-btn {
    background: linear-gradient(135deg, rgba(201,168,76,0.18), rgba(201,168,76,0.06));
    border: 1px solid var(--gold-dark);
    color: var(--gold-light);
    border-radius: 30px;
    padding: 9px 22px;
    font-family: 'Special Elite', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .share-btn:hover { background: rgba(201,168,76,0.25); }
  .share-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── MACHINE GLOW ── */
  .machine.glow { animation: glow-pulse 1.2s ease-out forwards; }
  @keyframes glow-pulse {
    0%   { box-shadow: 0 0 0 1px rgba(201,168,76,0.1), 0 0 20px rgba(201,168,76,0.1); }
    50%  { box-shadow: 0 0 0 2px rgba(201,168,76,0.4), 0 0 80px rgba(201,168,76,0.3), 0 0 120px rgba(120,40,200,0.5); }
    100% { box-shadow: 0 0 0 1px rgba(201,168,76,0.2), 0 0 40px rgba(201,168,76,0.15), 0 0 60px rgba(100,30,180,0.3); }
  }

  .footer {
    margin-top: 24px;
    font-family: 'Special Elite', monospace;
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-align: center;
    opacity: 0.45;
  }

  @media (max-width: 400px) {
    .bol-wrap { width: 150px; height: 150px; }
    .reel { height: 96px; }
    .reel-item { height: 96px; }
    .reel-item .emoji { font-size: 1.7rem; }
    .reel-item .label { font-size: 0.72rem; }
    .spin-btn { padding: 12px 24px; font-size: 0.92rem; }
    .result-line .q { min-width: 130px; font-size: 0.92rem; }
    .result-line .a { font-size: 1rem; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- 1. Glazen bol helemaal bovenaan -->
  <div class="bol-wrap">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bolGrad" cx="38%" cy="32%" r="62%">
          <stop offset="0%"   stop-color="#d0c0ff" stop-opacity="0.95"/>
          <stop offset="25%"  stop-color="#8060c8" stop-opacity="0.85"/>
          <stop offset="60%"  stop-color="#2a0a50" stop-opacity="0.95"/>
          <stop offset="100%" stop-color="#0a0318" stop-opacity="1"/>
        </radialGradient>
        <radialGradient id="bolHighlight" cx="35%" cy="28%" r="40%">
          <stop offset="0%"   stop-color="white" stop-opacity="0.5"/>
          <stop offset="60%"  stop-color="white" stop-opacity="0.05"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="mistGrad" cx="50%" cy="60%" r="50%">
          <stop offset="0%"   stop-color="#a080ff" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#6040c0" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="mistGrad2" cx="40%" cy="45%" r="50%">
          <stop offset="0%"   stop-color="#80c0ff" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="#4080d0" stop-opacity="0"/>
        </radialGradient>
        <clipPath id="bolClip"><circle cx="100" cy="95" r="78"/></clipPath>
        <filter id="bolGlow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="goldRing" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"   stop-color="#f0d080"/>
          <stop offset="40%"  stop-color="#c9a84c"/>
          <stop offset="70%"  stop-color="#8a6a1a"/>
          <stop offset="100%" stop-color="#f0d080"/>
        </linearGradient>
        <linearGradient id="footGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#5a3a90"/>
          <stop offset="100%" stop-color="#1a0830"/>
        </linearGradient>
      </defs>
      <circle class="bol-glow-ring" cx="100" cy="95" r="80" fill="none" stroke="#9060e0" stroke-width="3" opacity="0.35"/>
      <ellipse cx="100" cy="178" rx="28" ry="6" fill="#3a1a60" opacity="0.7"/>
      <rect x="88" y="168" width="24" height="14" rx="4" fill="url(#footGrad)" opacity="0.85"/>
      <ellipse cx="100" cy="168" rx="14" ry="4" fill="#7050b0" opacity="0.6"/>
      <circle cx="100" cy="95" r="78" fill="url(#bolGrad)" filter="url(#bolGlow)"/>
      <g clip-path="url(#bolClip)">
        <ellipse class="bol-mist"  cx="100" cy="110" rx="65" ry="40" fill="url(#mistGrad)"/>
        <ellipse class="bol-mist2" cx="90"  cy="90"  rx="55" ry="35" fill="url(#mistGrad2)"/>
        <circle cx="75"  cy="80"  r="1.5" fill="white" opacity="0.5"/>
        <circle cx="115" cy="70"  r="1"   fill="white" opacity="0.4"/>
        <circle cx="130" cy="95"  r="1.5" fill="white" opacity="0.35"/>
        <circle cx="65"  cy="105" r="1"   fill="white" opacity="0.45"/>
        <circle cx="105" cy="115" r="2"   fill="#c0a0ff" opacity="0.4"/>
        <ellipse cx="100" cy="88" rx="7" ry="9" fill="#b090e0" opacity="0.12"/>
        <rect x="94" y="97" width="12" height="18" rx="3" fill="#b090e0" opacity="0.10"/>
        <path d="M 30 120 Q 60 108 80 115 Q 100 122 120 112 Q 145 102 170 118" stroke="#9070d0" stroke-width="1.5" fill="none" opacity="0.2"/>
        <circle cx="100" cy="95" r="78" fill="url(#bolHighlight)"/>
        <circle cx="100" cy="95" r="78" fill="none" stroke="rgba(0,0,0,0.4)" stroke-width="8"/>
      </g>
      <circle cx="100" cy="95" r="78" fill="none" stroke="url(#goldRing)" stroke-width="2.5"/>
    </svg>
  </div>

  <!-- 2. Titel + tagline -->
  <div class="header">
    <h1>De Glazen Bol</h1>
    <p class="tagline">Druk op de knop en kom erachter hoe jij er over 20 jaar voor staat.</p>
  </div>

  <!-- MACHINE -->
  <div class="machine" id="machine">

    <!-- Vage bol als watermark achtergrond -->
    <div class="machine-bol-bg">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bg-bolGrad" cx="38%" cy="32%" r="62%">
            <stop offset="0%"   stop-color="#c0a0ff" stop-opacity="0.9"/>
            <stop offset="35%"  stop-color="#7050c0" stop-opacity="0.8"/>
            <stop offset="70%"  stop-color="#2a0a50" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#0a0318" stop-opacity="1"/>
          </radialGradient>
          <radialGradient id="bg-highlight" cx="35%" cy="28%" r="38%">
            <stop offset="0%"   stop-color="white" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="white" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle cx="100" cy="100" r="90" fill="url(#bg-bolGrad)"/>
        <circle cx="100" cy="100" r="90" fill="url(#bg-highlight)"/>
        <circle cx="100" cy="100" r="90" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.5"/>
      </svg>
    </div>

    <!-- 3. Bovenste ornament: "op de volgende gebieden" -->
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-text">op de volgende gebieden</div>
      <div class="ornament-line"></div>
    </div>

    <div class="reels-grid" id="reelsGrid"></div>

    <div class="ornament" style="margin-top:4px;">
      <div class="ornament-line"></div>
      <div class="ornament-diamond">◆</div>
      <div class="ornament-line"></div>
    </div>

    <div class="btn-area">
      <!-- 10. Knoptekst -->
      <button class="spin-btn" id="spinBtn" onclick="spinAll()">✦ Kijk in de toekomst ✦</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="result-box" id="resultBox">
    <div class="result-header">
      <!-- 5. "de bol heeft gesproken" klein, "over 20 jaar" groot en prominent -->
      <span class="spoken">✦ de bol heeft gesproken ✦</span>
      <span class="over20">Over 20 jaar…</span>
    </div>
    <div id="resultLines"></div>
    <!-- 8. Link naar website zichtbaar in het vlak (ook op screenshot) -->
    <div class="result-url" id="resultUrl"></div>
    <div class="share-area">
      <button class="share-btn" id="shareBtn" onclick="takeScreenshot()">📸 Laat het anderen weten</button>
    </div>
  </div>

  <div class="footer">De toekomst is onzeker · druk zo vaak als je wilt</div>
</div>

<script>
  const SITE_URL = window.location.href.replace(/\/$/, '');

  const QUESTIONS = [
    'Is jouw partner…',
    'Heb jij last van…',
    'Werk jij als…',
    'Heb je een avontuur meegemaakt…',
    'Woon je…',
    'Kleed jij je…',
  ];

  const DATA = [
    {

  // 6. Maak eerste letter van antwoord lowercase
  function lowerFirst(str) {
    if (!str) return str;
    return str.charAt(0).toLowerCase() + str.slice(1);
  }

  let currentResults = {};
  let isSpinning = false;

  function buildReels() {
    const grid = document.getElementById('reelsGrid');
    DATA.forEach(cat => {
      const wrapper = document.createElement('div');
      wrapper.className = 'reel-wrapper';

      const lbl = document.createElement('div');
      lbl.className = 'reel-label';
      lbl.textContent = cat.label;

      const reel = document.createElement('div');
      reel.className = 'reel';
      reel.id = 'reel-' + cat.id;

      const strip = document.createElement('div');
      strip.className = 'reel-strip';
      strip.id = 'strip-' + cat.id;

      [...cat.items, ...cat.items, ...cat.items].forEach(item => {
        const el = document.createElement('div');
        el.className = 'reel-item';
        el.innerHTML = `<span class="emoji">${item.emoji}</span><span class="label">${item.label}</span>`;
        strip.appendChild(el);
      });

      reel.appendChild(strip);
      wrapper.appendChild(lbl);
      wrapper.appendChild(reel);
      grid.appendChild(wrapper);
    });
  }

  function pickRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function spinAll() {
    if (isSpinning) return;
    isSpinning = true;

    const btn = document.getElementById('spinBtn');
    btn.disabled = true;
    btn.textContent = '⟳ De bol kijkt…';

    document.getElementById('resultBox').classList.remove('visible');
    document.getElementById('machine').classList.remove('glow');

    const results = {};
    const stopDelays = [600, 900, 1200, 1500, 1800, 2100];

    DATA.forEach(cat => {
      document.getElementById('reel-' + cat.id).classList.add('spinning');
    });

    DATA.forEach((cat, i) => {
      const chosen = pickRandom(cat.items);
      results[cat.id] = { cat: cat.label, ...chosen };

      setTimeout(() => {
        const reel  = document.getElementById('reel-' + cat.id);
        const strip = document.getElementById('strip-' + cat.id);
        reel.classList.remove('spinning');
        strip.innerHTML = '';
        const el = document.createElement('div');
        el.className = 'reel-item';
        el.innerHTML = `<span class="emoji">${chosen.emoji}</span><span class="label">${chosen.label}</span>`;
        strip.appendChild(el);

        if (i === DATA.length - 1) {
          currentResults = results;
          setTimeout(() => {
            showResults(results);
            document.getElementById('machine').classList.add('glow');
            btn.disabled = false;
            // 9. Knoptekst na spin
            btn.textContent = '✦ Kijk nog eens beter in de glazen bol ✦';
            isSpinning = false;
          }, 300);
        }
      }, stopDelays[i]);
    });
  }

  function showResults(results) {
    const box   = document.getElementById('resultBox');
    const lines = document.getElementById('resultLines');
    lines.innerHTML = '';

    DATA.forEach((cat, i) => {
      const r    = results[cat.id];
      const line = document.createElement('div');
      line.className = 'result-line';
      // 6. antwoord: emoji + lowercase label, iets groter (.a)
      line.innerHTML = `<span class="q">${QUESTIONS[i]}</span><span class="a">${r.emoji} ${lowerFirst(r.label)}</span>`;
      lines.appendChild(line);
    });

    // 8. Toon de volledige URL van de site (blijft zichtbaar op screenshot)
    document.getElementById('resultUrl').textContent = '🔮 ' + SITE_URL;

    box.classList.add('visible');
    box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  async function takeScreenshot() {
    const btn = document.getElementById('shareBtn');
    const urlEl = document.getElementById('resultUrl');

    // 8. Zorg dat de URL zichtbaar is (niet "even wachten") — dat is al standaard zo
    btn.textContent = '⟳ Even wachten…';
    btn.disabled = true;

    try {
      const el = document.getElementById('resultBox');
      const canvas = await html2canvas(el, {
        backgroundColor: '#0d0520',
        scale: 2,
        useCORS: true,
        logging: false,
      });
      const link = document.createElement('a');
      link.download = 'mijn-toekomst-over-20-jaar.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch(e) {
      alert('Screenshot mislukt. Maak een schermafbeelding via je apparaat.');
    }

    btn.textContent = '📸 Laat het anderen weten';
    btn.disabled = false;
  }
